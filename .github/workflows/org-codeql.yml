name: org-codeql

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Detect supported CodeQL languages
        id: detect
        run: |
          languages=()

          if find . -type f -name '*.py' -print -quit | grep -q .; then
            languages+=("python")
          fi

          if find . -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.mjs' -o -name '*.cjs' -o -name '*.ts' -o -name '*.tsx' \) -print -quit | grep -q .; then
            languages+=("javascript-typescript")
          fi

          if [ "${#languages[@]}" -eq 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "enabled=true"
            IFS=,
            echo "languages=${languages[*]}"
          } >> "$GITHUB_OUTPUT"

      - name: Initialize CodeQL
        if: steps.detect.outputs.enabled == 'true'
        uses: github/codeql-action/init@45580472a5bb82c4681c4ac726cfdb60060c2ee1
        with:
          languages: ${{ steps.detect.outputs.languages }}

      - name: Autobuild
        if: steps.detect.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@45580472a5bb82c4681c4ac726cfdb60060c2ee1

      - name: Analyze
        if: steps.detect.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@45580472a5bb82c4681c4ac726cfdb60060c2ee1

      - name: Skip when no supported source files exist
        if: steps.detect.outputs.enabled != 'true'
        run: echo "No Python or JavaScript/TypeScript source files found; skipping CodeQL."
